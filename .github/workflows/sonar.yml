name: SonarCloud Analysis

on:
  push:
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests and generate coverage report
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport --no-daemon

      - name: Verify coverage report existence
        run: |
          ls -R app/build/reports/jacoco/
          test -f app/build/reports/jacoco/test/jacocoTestReport.xml
          echo "XML Report content preview:"
          head -n 20 app/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Run lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: ./gradlew sonar --no-daemon
